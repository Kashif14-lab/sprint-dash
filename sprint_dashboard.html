<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Dashboard — PS MSS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:13px;transition:background .3s,color .3s}
.d{--bg:#0c0e14;--sur:#151820;--sur2:#1c1f2e;--bor:#262a3d;--text:#dde1f5;--mut:#606888;--acc:#5b6ef5;--grn:#18c97a;--red:#f05252;--amb:#f5a623;--pur:#9b72f5;--teal:#22c4c4;background:var(--bg);color:var(--text);min-height:100vh}
.d.light{--bg:#f0f2f9;--sur:#ffffff;--sur2:#e8ebf5;--bor:#d4d8ed;--text:#1a1d2e;--mut:#7278a0;--acc:#4050e8;--grn:#0aaa62;--red:#d93535;--amb:#c47e0a;--pur:#7c3aed;--teal:#0e9f9f}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
/* topbar */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.brand h1{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.brand p{font-size:11px;color:var(--mut);margin-top:3px}
.tbr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{background:var(--sur);color:var(--text);border:0.5px solid var(--bor);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;outline:none}
.btn{background:var(--sur);color:var(--mut);border:0.5px solid var(--bor);border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer}
.btn:hover{color:var(--text);border-color:var(--acc)}
.btn-acc{background:rgba(91,110,245,.12);color:var(--acc);border-color:rgba(91,110,245,.3)}
/* loading/error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spin{width:36px;height:36px;border:2px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:12px;color:var(--mut)}
.err{background:rgba(240,82,82,.07);border:0.5px solid rgba(240,82,82,.3);border-radius:10px;padding:24px;text-align:center;color:var(--red);font-size:12px;line-height:1.8}
/* sync bar */
.sbar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--sur2);border-radius:8px;margin-bottom:18px;font-size:10px;color:var(--mut)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:7px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* section label */
.sec{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px}
/* kpis */
.krow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.kpi{background:var(--sur);border:0.5px solid var(--bor);border-radius:10px;padding:14px 12px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.blue::after{background:var(--acc)}.kpi.green::after{background:var(--grn)}.kpi.red::after{background:var(--red)}.kpi.amber::after{background:var(--amb)}.kpi.purple::after{background:var(--pur)}.kpi.teal::after{background:var(--teal)}
.kpi-l{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.kpi-v{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.kpi-s{font-size:10px;margin-top:5px}
.g{color:var(--grn)}.r{color:var(--red)}.n{color:var(--mut)}
/* sprint progress */
.sp-card{background:var(--sur);border:0.5px solid var(--bor);border-radius:12px;padding:18px;margin-bottom:14px}
.sp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sp-title{font-size:13px;font-weight:600;color:var(--text)}
.sp-badge{font-size:11px;padding:4px 14px;border-radius:20px;font-weight:500;border:0.5px solid}
.sp-badge.bg{background:rgba(24,201,122,.1);color:var(--grn);border-color:rgba(24,201,122,.3)}
.sp-badge.ba{background:rgba(245,166,35,.1);color:var(--amb);border-color:rgba(245,166,35,.3)}
.sp-badge.br{background:rgba(240,82,82,.1);color:var(--red);border-color:rgba(240,82,82,.3)}
.sp-badge.bd{background:rgba(91,110,245,.1);color:var(--acc);border-color:rgba(91,110,245,.3)}
.sp-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-bottom:6px}
.sp-track{height:10px;background:var(--sur2);border-radius:5px;overflow:hidden}
.sp-fill{height:100%;border-radius:5px;transition:width .7s}
.sp-hint{font-size:10px;color:var(--mut);margin-top:5px;text-align:right}
.day-row{display:flex;gap:3px;margin:12px 0 16px;flex-wrap:wrap}
.dp{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex:1;min-width:22px;max-width:40px}
.tp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tp{background:var(--sur2);border-radius:8px;padding:12px}
.tp-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tp-name{font-size:12px;font-weight:500;color:var(--text)}
.tp-pct{font-size:13px;font-weight:600}
.tp-bar{height:5px;background:var(--bor);border-radius:3px;overflow:hidden;margin-bottom:6px}
.tp-fill{height:100%;border-radius:3px}
.tp-info{font-size:9px;color:var(--mut)}
/* cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.cc{background:var(--sur);border:0.5px solid var(--bor);border-radius:12px;padding:16px;margin-bottom:12px}
.g2 .cc,.g3 .cc{margin-bottom:0}
.cc-t{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.cc-s{font-size:10px;color:var(--mut);margin-bottom:12px}
/* legend */
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mut)}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid var(--bor);color:var(--mut);background:transparent}
.tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
/* scope bars */
.sc-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sc-lbl{font-size:11px;color:var(--text);width:60px;flex-shrink:0}
.sc-track{flex:1;height:20px;background:var(--sur2);border-radius:4px;overflow:hidden;display:flex}
.sc-p{height:100%;background:var(--acc);opacity:.8}
.sc-u{height:100%;background:var(--red);opacity:.8}
.sc-pct{font-size:10px;color:var(--mut);width:70px;text-align:right;flex-shrink:0}
/* effort */
.ef-wrap{display:flex;align-items:center;gap:16px}
.ef-leg{flex:1;display:flex;flex-direction:column;gap:7px}
.ef-row{display:flex;align-items:center;gap:7px;font-size:11px}
.ef-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* goals */
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
/* ── SPRINT GOAL EDITOR ── */
.sg-card{background:var(--sur);border:0.5px solid var(--bor);border-left:3px solid var(--acc);border-radius:12px;overflow:hidden}
.sg-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:0.5px solid var(--bor);background:var(--sur2)}
.sg-header-title{font-size:12px;font-weight:600;color:var(--text)}
.sg-header-sub{font-size:10px;color:var(--mut);margin-top:2px}
.sg-body{padding:18px 20px}

/* Bugs list dropdown */
.bugs-dd-header{cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;transition:background .15s;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.bugs-dd-header:hover{background:rgba(155,114,245,.06)}
.bugs-dd-title{display:flex;align-items:center;gap:10px}
.bugs-dd-chev{display:inline-block;font-size:9px;color:var(--mut);transition:transform .2s}
.bugs-dd-header.open .bugs-dd-chev{transform:rotate(90deg);color:var(--acc)}
.bugs-dd-count{background:rgba(155,114,245,.15);color:var(--acc);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.03em}
.bugs-dd-body{max-height:520px;overflow-y:auto;border:1px solid var(--bor);border-radius:8px;padding:8px;background:var(--bg)}

/* Sprint Retrospective */
.retro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:900px){.retro-grid{grid-template-columns:1fr}}
.retro-card{background:var(--sur);border:1px solid var(--bor);border-left:3px solid var(--ac);border-radius:10px;padding:16px;min-height:140px}
.retro-card[data-kind=wentWell]{--ac:#18c97a}
.retro-card[data-kind=challenges]{--ac:#f05252}
.retro-card[data-kind=actions]{--ac:#f5a623}
.retro-card[data-kind=learnings]{--ac:#5b6ef5}
.retro-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.retro-title{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ac);display:flex;align-items:center;gap:6px}
.retro-icon{font-size:16px}
.retro-count{font-size:10px;color:var(--mut);font-weight:600}
.retro-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.retro-item{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text);line-height:1.5;display:flex;align-items:flex-start;gap:8px;word-wrap:break-word}
.retro-item .r-text{flex:1;word-wrap:break-word;overflow-wrap:break-word;min-width:0}
.retro-item .r-del{cursor:pointer;color:var(--mut);font-size:14px;line-height:1;opacity:0;transition:opacity .15s;padding:0 2px;flex-shrink:0}
.retro-item:hover .r-del{opacity:1}
.retro-item .r-del:hover{color:var(--red)}
.retro-empty{font-size:11px;color:var(--mut);font-style:italic;padding:4px 0}
.retro-add{display:flex;gap:6px}
.retro-add input{flex:1;padding:7px 10px;background:var(--bg);border:1px solid var(--bor);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s}
.retro-add input:focus{border-color:var(--ac)}
.retro-add-btn{padding:7px 12px;border-radius:6px;background:var(--ac);color:#fff;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.retro-add-btn:hover{opacity:.85}
/* Display mode */
.sg-display{font-size:13px;color:var(--text);line-height:1.7;word-wrap:break-word}
.sg-display h3{font-size:14px;font-weight:700;color:var(--acc);margin:18px 0 8px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.sg-display h3::before{content:'';display:inline-block;width:3px;height:14px;background:var(--acc);border-radius:2px;flex-shrink:0}
.sg-display h3:first-child{margin-top:0}
.sg-display h4{font-size:12px;font-weight:600;color:var(--text);margin:12px 0 6px;opacity:.8}
.sg-display ul{margin:4px 0 10px;padding-left:0;list-style:none}
.sg-display ul ul{padding-left:16px;margin:2px 0}
.sg-display li{margin:4px 0;color:var(--text);padding-left:16px;position:relative;font-size:12px}
.sg-display li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--acc);opacity:.7}
.sg-display ul ul li::before{background:var(--mut);width:4px;height:4px;top:7px}
.sg-display p{margin:6px 0;font-size:12px}
.sg-empty{color:var(--mut);font-size:13px;text-align:center;padding:24px 0}
.sg-empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}
.sg-empty-txt{color:var(--mut);font-size:12px;margin-bottom:14px}
/* Actions */
.sg-actions{display:flex;gap:6px;flex-wrap:wrap}
.sg-btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--bor);background:var(--sur2);color:var(--mut);transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.sg-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(91,110,245,.06)}
.sg-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.sg-btn.primary:hover{opacity:.88}
.sg-btn.danger{border-color:rgba(240,82,82,.4);color:var(--red)}
.sg-btn.danger:hover{background:rgba(240,82,82,.08)}
/* Edit mode */
.sg-editor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:260px}
@media(max-width:700px){.sg-editor-wrap{grid-template-columns:1fr}}
.sg-editor-side{display:flex;flex-direction:column;gap:8px}
.sg-editor-label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.sg-toolbar{display:flex;gap:5px;flex-wrap:wrap}
.sg-tb-btn{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid var(--bor);background:var(--sur2);color:var(--mut);font-family:inherit;transition:all .15s}
.sg-tb-btn:hover{border-color:var(--acc);color:var(--acc)}
.sg-input{flex:1;padding:12px 14px;background:var(--bg);border:1.5px solid var(--bor);border-radius:8px;color:var(--text);font-family:'Consolas','Monaco',monospace;font-size:12px;line-height:1.6;outline:none;resize:none;min-height:200px}
.sg-input:focus{border-color:var(--acc)}
.sg-preview-pane{background:var(--sur2);border-radius:8px;padding:14px;overflow-y:auto;min-height:200px;border:0.5px solid var(--bor)}
.sg-hint{font-size:10px;color:var(--mut);line-height:1.5}
.sg-hint code{background:var(--sur2);padding:1px 5px;border-radius:3px;color:var(--acc);font-family:monospace}
.sg-meta{font-size:10px;color:var(--mut);display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:0.5px solid var(--bor);margin-top:10px}
.sg-status{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.sg-status.cloud{background:rgba(24,201,122,.1);color:var(--grn)}
.sg-status.local{background:rgba(245,166,35,.12);color:var(--amb)}
.goal-card{background:var(--sur);border:0.5px solid var(--bor);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.goal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.goal-team{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.goal-text{font-size:12px;color:var(--text);line-height:1.6}
/* impact cards */
.impact-top{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.imp-card{background:var(--sur);border:0.5px solid var(--bor);border-radius:10px;padding:14px;text-align:center}
.imp-val{font-size:20px;font-weight:600;margin-bottom:4px}
.imp-lbl{font-size:10px;color:var(--mut)}
/* ul-row list */
.ul-row{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--bor);gap:10px}
.ul-row:last-child{border:none}
.ul-name{font-size:11px;color:var(--text);flex:1;line-height:1.5}
.ul-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ul-team{font-size:9px;padding:2px 7px;border-radius:6px;background:var(--sur2);color:var(--mut)}
.ul-hrs{font-size:10px;color:var(--red)}
/* badge */
.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:6px;background:var(--sur2);color:var(--mut);font-weight:500}
.badge.red{background:rgba(240,82,82,.1);color:var(--red)}
.badge.amb{background:rgba(245,166,35,.1);color:var(--amb)}
.badge.grn{background:rgba(24,201,122,.1);color:var(--grn)}
.badge.blue{background:rgba(77,159,255,.1);color:#4d9fff}
.badge.acc{background:rgba(91,110,245,.1);color:var(--acc)}
/* early completions */
.early-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ec{background:var(--sur);border:0.5px solid rgba(24,201,122,.2);border-radius:10px;padding:14px;position:relative}
.ec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grn);border-radius:10px 10px 0 0}
.ec-badge{position:absolute;top:10px;right:10px;font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(24,201,122,.1);color:var(--grn);border:0.5px solid rgba(24,201,122,.25)}
.ec-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;padding-right:60px}
.ec-task{font-size:10px;color:var(--mut);margin-bottom:10px;line-height:1.5}
.ec-stats{display:flex;gap:14px}
.ec-st label{display:block;font-size:9px;color:var(--mut);text-transform:uppercase;margin-bottom:2px}
.ec-st span{font-size:12px;font-weight:500}
/* performance */
.perf-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.perf-stat{background:var(--sur2);border:0.5px solid var(--bor);border-radius:8px;padding:12px;text-align:center}
.perf-stat-v{font-size:18px;font-weight:600;color:var(--text);line-height:1}
.perf-stat-l{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
.perf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.perf-tbl th{font-size:9px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:9px 8px;text-align:left;border-bottom:0.5px solid var(--bor);background:var(--sur2)}
.perf-tbl th.num{text-align:right}
.perf-tbl td{padding:10px 8px;border-bottom:0.5px solid var(--bor);color:var(--text);vertical-align:middle}
.perf-tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.perf-tbl tr:last-child td{border-bottom:none}
.perf-tbl tr:hover td{background:var(--sur2)}
.perf-rank{width:24px;height:24px;border-radius:50%;background:var(--sur2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--mut)}
.perf-rank.r1{background:rgba(245,166,35,.15);color:var(--amb)}
.perf-rank.r2{background:rgba(155,114,245,.15);color:var(--pur)}
.perf-rank.r3{background:rgba(34,196,196,.15);color:var(--teal)}
.perf-name{font-weight:500;color:var(--text)}
.perf-team{display:inline-block;font-size:9px;padding:2px 7px;border-radius:6px;color:#fff;font-weight:600;margin-left:6px}
.perf-bar{width:90px;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
.perf-bar-fill{height:100%;border-radius:3px}
.perf-grade{display:inline-flex;align-items:center;justify-content:center;width:32px;height:22px;border-radius:6px;font-size:11px;font-weight:700}
.grade-Aplus{background:rgba(24,201,122,.15);color:var(--grn)}
.grade-A{background:rgba(24,201,122,.12);color:var(--grn)}
.grade-B{background:rgba(91,110,245,.12);color:var(--acc)}
.grade-C{background:rgba(245,166,35,.12);color:var(--amb)}
.grade-D{background:rgba(240,82,82,.12);color:var(--red)}
.perf-score-cell{font-weight:600;font-size:13px}
.perf-mini{font-size:9px;color:var(--mut);margin-top:2px}
/* subtask cards */
.sub-table{width:100%;border-collapse:collapse;font-size:12px}
.sub-table th{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);padding:8px 10px;border-bottom:1px solid var(--bor);text-align:left;position:sticky;top:0;background:var(--bg);z-index:1}
.sub-table th:nth-child(3),.sub-table th:nth-child(4),.sub-table th:nth-child(5){text-align:right}
.sub-parent-row{cursor:pointer;transition:background .15s}
.sub-parent-row:hover{background:rgba(155,114,245,.06)}
.sub-parent-row td{padding:10px 10px;border-bottom:1px solid var(--bor);font-weight:600;color:var(--text)}
.sub-parent-row .sub-arrow{display:inline-block;transition:transform .2s;margin-right:6px;font-size:9px;color:var(--mut)}
.sub-parent-row.open .sub-arrow{transform:rotate(90deg)}

}

<body>
<div class="d" id="root">

<!-- LOGIN GATE -->
<div class="login-wrap" id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <div class="login-title">Sprint Dashboard Access</div>
    <div class="login-sub">Enter your work email to continue.<br>Only whitelisted users can view this dashboard.</div>
    <input type="email" class="login-input" id="loginEmail" placeholder="yourname@playspare.com" autofocus>
    <button class="login-btn" id="loginBtn">Continue</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div class="wrap" id="dashboardView" style="display:none">
  <div class="topbar">
    <div class="brand">
      <h1>Sprint Performance Dashboard</h1>
      <p>Playspare · MSS Team · Live data from Google Sheets</p>
    </div>
    <div class="tbr">
      <select id="spSel"></select>
      <button class="btn btn-acc" id="syncBtn">Refresh</button>
      <button class="btn" id="thBtn">Light mode</button>
      <div class="login-user" id="userBadge">
        <span>👤 <span class="u-name" id="userName"></span></span>
        <button class="login-logout" onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </div>
  <div id="mc">
    <div class="loading"><div class="spin"></div><p>Loading data from Google Sheets...</p></div>
  </div>
</div>
</div>

<script>
var API='https://script.google.com/macros/s/AKfycbx1oX9blyQ5yx1lWPWdbzqivrg4CkltuPe4chvP_COJXFubhZDbWhP8yUFGRsNG5alTmw/exec';
var CH={},isDark=true,raw=null,cur=null,curTeam='All',curIndvTeam='All';
var TC=['#5b6ef5','#18c97a','#9b72f5','#f5a623','#f05252','#22c4c4','#0aaa62'];
var TEAM_COLORS={};

function tc(team){
  if(!team)return TC[4];
  if(!TEAM_COLORS[team])TEAM_COLORS[team]=TC[Object.keys(TEAM_COLORS).length%TC.length];
  return TEAM_COLORS[team];
}
function cc(){return{text:isDark?'#dde1f5':'#111424',grid:isDark?'rgba(150,160,220,.08)':'rgba(0,0,0,.06)'}}
function pc(a,b){return b?Math.round(a/b*100):0;}
function rnd(v){return Math.round(v*10)/10;}
function pd(str){
  if(!str)return null;
  var s=str.toString().replace(/(\d+)(st|nd|rd|th)/i,'$1');
  var d=new Date(s);
  return isNaN(d.getTime())?null:d;
}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||'';}

Chart.defaults.font.family='system-ui,-apple-system,sans-serif';
Chart.defaults.plugins.tooltip.backgroundColor='rgba(17,20,36,.92)';
Chart.defaults.plugins.tooltip.titleColor='#fff';
Chart.defaults.plugins.tooltip.bodyColor='#dde1f5';
Chart.defaults.plugins.tooltip.padding=12;

function fetchData(){
  var email = encodeURIComponent(window._userEmail || '');
  return fetch(API+'?email='+email, {method:'GET',redirect:'follow',cache:'no-cache'})
    .then(function(r){return r.text();})
    .then(function(t){
      var parsed = JSON.parse(t.trim());
      if(parsed.error === 'unauthorized'){
        // Session expired or access revoked
        localStorage.removeItem('dashUser');
        showLoginScreen();
        throw new Error(parsed.message || 'Access denied');
      }
      return parsed;
    });
}

function process(json,spId){
  var tasks   = (json.tasks||[]).filter(function(t){return !spId||t.sprintId===spId;});
  var subtasks= (json.subtasks||[]).filter(function(t){return !spId||t.sprintId===spId;});
  var sprints = json.sprints||[];
  var goals   = (json.goals||[]).filter(function(g){return g.sprintId===spId;});
  var carried = json.carriedOver||[];
  var spInfo  = sprints.find(function(s){return s.id===spId;})||{};

  // Sprint date range for filtering bugs & backlog
  var spStart = pd(spInfo.start);
  var spEnd   = pd(spInfo.end);
  if(spEnd) spEnd = new Date(spEnd.getTime() + 864e5 - 1);

  // Bugs & backlog filtered by sprint date range (createdOn)
  var allBugs = json.bugsTasks||[];
  var bugs = allBugs.filter(function(b){
    if(!spStart||!spEnd) return true;
    var d = pd(b.createdOn); return d && d >= spStart && d <= spEnd;
  });
  var allBacklog = json.backlogTasks||[];
  var backlog = allBacklog.filter(function(b){
    if(!spStart||!spEnd) return true;
    var d = pd(b.createdOn); return d && d >= spStart && d <= spEnd;
  });

  var tmap={},amap={};
  var totEst=0,totLog=0,done=0,prog=0,ns=0,ovd=0;
  var cTimes=[],early=[],unplanned=[],drainers=[],stars=[];

  // Helper: detect unplanned from featureTag OR taskType (any variant containing "unplanned")
  function isUnplanned(t){
    var tag=(t.featureTag||t['Feature Tag']||t.feature_tag||'').toString().toLowerCase();
    var type=(t.taskType||'').toString().toLowerCase();
    return tag.indexOf('unplanned')!==-1 || type==='unplanned';
  }

  // Combined list of tasks + subtasks for KPI calculations
  var allItems = tasks.concat(subtasks);

  allItems.forEach(function(t){
    var est=parseFloat(t.estTime)||0;
    var log=parseFloat(t.timeLog)||0;
    totEst+=est; totLog+=log;
    var st=(t.status||'').trim();
    var isDone=st==='Done';
    var isWip=st==='In Progress'||st==='In Review'||st==='Build Awaiting';
    if(isDone){
      done++;
      if(log>0)cTimes.push(log);
      if(est>0&&log>0&&log<est)early.push({name:t.taskName,asn:t.assignee||'',team:t.teamCategory||'',est:est,log:log,saved:rnd(est-log)});
    } else if(isWip) prog++;
    else ns++;
    // Overdue: task's own dueDate passed OR sprint ended and task not done
    if(!isDone){
      var isOverdue=false;
      if(t.dueDate){try{if(pd(t.dueDate)<new Date())isOverdue=true;}catch(e){}}
      if(!isOverdue && spEnd && new Date()>spEnd) isOverdue=true;
      if(isOverdue)ovd++;
    }
    if(isUnplanned(t)){
      unplanned.push({name:t.taskName,team:t.teamCategory||'',asn:t.assignee||'',est:est,log:log,status:st});
    }
    var variance=log-est;
    if(variance>0)drainers.push({name:t.taskName,asn:t.assignee||'',var:rnd(variance),log:log,est:est});
    if(t.impactScore&&String(t.impactScore).includes('5')){
      stars.push({name:t.taskName,asn:t.assignee||'',team:t.teamCategory||''});
    }
    var team=t.teamCategory||'';
    if(team){
      tc(team);
      if(!tmap[team])tmap[team]={n:team,done:0,prog:0,ns:0,ovd:0,est:0,log:0,tot:0};
    }
    if(team){
      tmap[team].est+=est; tmap[team].log+=log; tmap[team].tot++;
      if(isDone)tmap[team].done++;
      else if(isWip)tmap[team].prog++;
      else tmap[team].ns++;
      if(!isDone){
        var tOvd=false;
        if(t.dueDate){try{if(pd(t.dueDate)<new Date())tOvd=true;}catch(e){}}
        if(!tOvd && spEnd && new Date()>spEnd) tOvd=true;
        if(tOvd)tmap[team].ovd++;
      }
    }
    var asn=t.assignee||'Unassigned';
    if(!amap[asn])amap[asn]={n:asn,team:team,tot:0,done:0,est:0,log:0,times:[]};
    amap[asn].tot++; amap[asn].est+=est; amap[asn].log+=log;
    if(isDone){amap[asn].done++;if(log>0)amap[asn].times.push(log);}
  });

  drainers.sort(function(a,b){return b.var-a.var;});
  drainers=drainers.slice(0,5);

  Object.values(amap).forEach(function(a){
    a.avg=a.times.length?rnd(a.times.reduce(function(s,v){return s+v;},0)/a.times.length):0;
    a.est=rnd(a.est); a.log=rnd(a.log);
  });

  // Start date = Day 0 (planning, excluded). Day 1 = start+1. End date inclusive.
  // dDone = fully elapsed work days (strictly BEFORE today). Today is "in progress".
  var sd=pd(spInfo.start),ed=pd(spInfo.end),now=new Date();
  var dTot=0,dDone=0;
  if(sd&&ed){
    dTot=Math.max(1,Math.round((ed-sd)/864e5));
    // Normalize today to start of day for accurate day math
    var todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    var daysSinceStart=Math.floor((todayStart-sd)/864e5);
    // Subtract 1 because today is a working day in progress (not yet elapsed)
    // If daysSinceStart=0 (today=start=D0), dDone=0. daysSinceStart=1 (D1 today), dDone=0. etc.
    dDone=Math.max(0,Math.min(dTot,daysSinceStart-1));
  }

  // Burndown: D0 = planning (full estimate), D1..Dn = working days
  var burnDays=Math.min(dTot+1,16);
  var step=totEst/(burnDays-1||1);
  var logPD=dDone>0?totLog/dDone:0;
  var bI=[],bA=[],bL=[];
  for(var i=0;i<burnDays;i++){
    bL.push('D'+i);
    bI.push(rnd(totEst-step*i));
    if(i<=dDone)bA.push(Math.max(0,rnd(totEst-logPD*i)));
    else bA.push(null);
  }

  var scope=Object.values(tmap).map(function(t){
    var un=allItems.filter(function(x){return x.teamCategory===t.n && isUnplanned(x);}).length;
    var pl=allItems.filter(function(x){return x.teamCategory===t.n && !isUnplanned(x);}).length;
    return{n:t.n,pl:pl,un:un,tot:pl+un||1};
  });

  var unplannedEst=unplanned.reduce(function(s,t){return s+(parseFloat(t.est)||0);},0);
  var plannedEst=rnd(totEst-unplannedEst);
  var healthImpact=totEst>0?Math.round(unplannedEst/totEst*100):0;

  // Subtask grouping by parent
  var subtaskGroups={};
  subtasks.forEach(function(s){
    var p=s.parentTask||'Unknown';
    if(!subtaskGroups[p])subtaskGroups[p]=[];
    subtaskGroups[p].push(s);
  });

  // Bugs summary — filtered by sprint date range
  var bugStats={notStarted:0,inProg:0,done:0,reopened:0,total:bugs.length,totalAll:allBugs.length};
  bugs.forEach(function(b){
    var st=(b.status||'').trim();
    if(st==='Done')bugStats.done++;
    else if(st==='In Progress'||st==='In Review')bugStats.inProg++;
    else if(st==='Re-opened')bugStats.reopened++;
    else bugStats.notStarted++;
  });

  return{
    sprints,spInfo,tasks,subtasks,goals,bugs,backlog,carried,
    total:allItems.length,done,prog,ns,ovd,
    totEst:rnd(totEst),totLog:rnd(totLog),
    compRate:pc(done,allItems.length),
    util:pc(totLog,totEst),
    estAcc:totEst>0?Math.min(100,Math.round((1-Math.abs(totEst-totLog)/totEst)*100)):0,
    creep:pc(unplanned.length,allItems.length),
    avgComp:cTimes.length?rnd(cTimes.reduce(function(s,v){return s+v;},0)/cTimes.length):0,
    dTot,dDone,startDate:spInfo.start||'',endDate:spInfo.end||'',
    teams:Object.values(tmap),assignees:Object.values(amap),scope,
    effort:Object.values(tmap).map(function(t){return{n:t.n,v:rnd(t.log)};}),
    areaLbls:Object.values(tmap).map(function(t){return t.n;}),
    areaEst:Object.values(tmap).map(function(t){return Math.round(t.est);}),
    areaLog:Object.values(tmap).map(function(t){return Math.round(t.log);}),
    bI,bA,bL,early,unplanned,drainers,stars,
    unplannedCount:unplanned.length,
    unplannedEst:rnd(unplannedEst),
    plannedEst,healthImpact,
    subtaskGroups,bugStats,spStart,spEnd,allBugsTotal:allBugs.length,
    bugsRaw: allBugs,
    sprintGoals: json.sprintGoals||{},
    retrospectives: json.retrospectives||{},
  };
}

/* ── RENDER ── */
function render(d){
  document.getElementById('mc').innerHTML=shell();
  document.getElementById('st').textContent='Last synced: '+new Date().toLocaleTimeString();
  doKPIs(d); doProgress(d); doSprintGoal(d);
  doBurn(d); doArea(d);
  doIndividual(d,'All'); doScopeEffort(d); doImpact(d);
  window._sprintData=d;
  doSpillovers(d); doBugsBacklog(d);
  doTabs(d); doCombo(d,'All');
  doDrainersStars(d); doPerformance(d); doEarly(d);
  doRetrospective(d);
}

  /* 1. SCORECARD */

  +'<div class="krow" id="kr2"></div>'

  +'<div class="sec">Burndown</div>'

  +'<div class="cc-t">Burndown chart — remaining hours</div>'
  +'<div class="cc-s">Stepped tracking of remaining hours vs ideal trajectory</div>'

  /* 4. TIME & SCOPE */
  +'<div class="sec">Time logs · Scope creep · Unplanned tasks</div>'

  +'<div id="indvWrap" style="position:relative"><canvas id="indvC"></canvas></div>'
  +'<div id="bdBox" style="display:none;margin-top:20px;background:var(--sur2);padding:16px;border-radius:10px;border:1px solid var(--acc)"></div>'
  +'</div>'

  +'<div class="g2">'
  +'<div class="cc"><div class="cc-t">Scope creep by team</div><div class="cc-s">Planned (blue) vs unplanned (red)</div><div id="scB"></div></div>'
  +'<div class="cc"><div class="cc-t">Effort distribution</div><div class="cc-s">Logged hours by team</div>'

  +'<div class="ef-leg" id="eL"></div></div></div></div>'

  +'<div class="sec">Spillovers</div>'

  +'<div class="cc"><div class="cc-t">Backlog section items</div><div class="cc-s">Tasks currently in the Backlog section</div><div id="backlogS"></div></div>'

  +''

/* ── KPIs ── */
function doKPIs(d){
  var r1=[
    {c:'blue', l:'Completion rate',  v:d.compRate+'%', s:d.compRate>=85?'Healthy sprint':'Below 85% target',    sc:d.compRate>=85?'g':'r'},
    {c:'green',l:'Time utilization', v:d.util+'%',     s:d.util>=80?'Above 80% target':'Below minimum',         sc:d.util>=80?'g':'r'},
    {c:'amber',l:'Est. accuracy',    v:d.estAcc+'%',   s:d.estAcc>=85?'Estimation on track':'Needs work',       sc:d.estAcc>=85?'g':'r'},

    {c:'teal', l:'Avg completion',   v:d.avgComp?d.avgComp+' hrs':'—', s:'Per completed task',                  sc:'n'},
  ];
  var r2=[
    {c:'purple',l:'Total tasks',  v:d.total+'', s:d.done+' done · '+d.prog+' active',  sc:'n'},
    {c:'green', l:'Completed',    v:d.done+'',  s:pc(d.done,d.total)+'% of sprint',    sc:'g'},
    {c:'blue',  l:'In progress',  v:d.prog+'',  s:'Active right now',                  sc:'n'},

    {c:'red',   l:'Overdue',      v:d.ovd+'',   s:d.ovd===0?'All on schedule':'Past due', sc:d.ovd===0?'g':'r'},
  ];

  document.getElementById('kr1').innerHTML=r1.map(mk).join('');

/* ── SPRINT PROGRESS ── */
function doProgress(d){
  var pct=d.dTot>0?Math.min(100,Math.round(d.dDone/d.dTot*100)):0;
  var rem=Math.max(0,d.dTot-d.dDone);
  var bc=rem===0?'bd':(rem>5?'bg':(rem>2?'ba':'br'));
  var fc=rem===0?'var(--acc)':(rem>5?'var(--grn)':(rem>2?'var(--amb)':'var(--red)'));
  var b=document.getElementById('spB');
  b.className='sp-badge '+bc;
  b.textContent=rem===0?'Sprint complete':(rem===1?'Last day':rem+' days remaining');
  document.getElementById('spD').textContent=d.startDate+' — '+d.endDate;
  document.getElementById('spP').textContent=pct+'% complete';
  var f=document.getElementById('spF'); f.style.width=pct+'%'; f.style.background=fc;
  document.getElementById('spH').textContent=d.dDone+' of '+d.dTot+' days elapsed · '+rem+' days to go';

  // Day badges: D0 (planning, excluded) + D1..Dn (working days)
  var cells='<div class="dp" style="background:var(--sur2);color:var(--mut);border:1px dashed var(--bor);font-style:italic" title="Planning day (excluded)">D0</div>';
  for(var i=1;i<=Math.min(d.dTot,30);i++){
    // Day i is "past" when dDone >= i, "today" when dDone === i-1 (in progress)
    var past=i<=d.dDone, today=i===d.dDone+1 && rem>0;
    var bg=past?fc:(today?fc:'var(--sur2)');
    cells+='<div class="dp" style="background:'+bg+';opacity:'+(today?.6:1)+';color:'+((past||today)?'#fff':'var(--mut)')+'">D'+i+'</div>';
  }
  document.getElementById('dRow').innerHTML=cells;

  // Overall progress card + team-wise cards
  var totDone=d.done||0, totTasks=d.total||1;
  var overPct=pc(totDone,totTasks);
  var overCol=overPct>=80?'var(--grn)':(overPct>=50?'var(--amb)':'var(--red)');
  var overHtml='<div class="tp" style="border:1px solid '+overCol+';background:rgba(155,114,245,.04)">'
    +'<div class="tp-head"><span class="tp-name" style="font-weight:700;color:var(--text)">Overall</span><span class="tp-pct" style="color:'+overCol+';font-size:14px">'+overPct+'%</span></div>'
    +'<div class="tp-bar"><div class="tp-fill" style="width:'+overPct+'%;background:'+overCol+'"></div></div>'
    +'<div class="tp-info">'+totDone+'/'+totTasks+' done · '+rnd(d.totLog||0)+'/'+rnd(d.totEst||0)+' hrs</div></div>';

  document.getElementById('tpG').innerHTML=overHtml+d.teams.map(function(t){
    var tp=pc(t.done,t.tot);
    var col=tp>=80?'var(--grn)':(tp>=50?'var(--amb)':'var(--red)');
    return '<div class="tp"><div class="tp-head"><span class="tp-name">'+t.n+'</span><span class="tp-pct" style="color:'+col+'">'+tp+'%</span></div>'
      +'<div class="tp-bar"><div class="tp-fill" style="width:'+tp+'%;background:'+col+'"></div></div>'
      +'<div class="tp-info">'+t.done+'/'+t.tot+' done · '+rnd(t.log)+' hrs logged</div></div>';
  }).join('');
}

// Markdown-lite parser
function sgParse(text){
  var lines=text.split('\n'), html='', inList=false, inSub=false;
  function closeList(){if(inSub){html+='</ul>';inSub=false;}if(inList){html+='</ul>';inList=false;}}
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  lines.forEach(function(raw){
    var line=raw.replace(/\s+$/,'');
    if(!line.trim()){closeList();return;}
    if(/^##\s+/.test(line)){closeList();html+='<h4>'+esc(line.replace(/^##\s+/,''))+'</h4>';return;}
    if(/^#\s+/.test(line)){closeList();html+='<h3>'+esc(line.replace(/^#\s+/,''))+'</h3>';return;}
    if(/^\s*(--|\*\*)\s+/.test(line)){
      if(!inList){html+='<ul>';inList=true;}
      if(!inSub){html+='<ul>';inSub=true;}
      html+='<li>'+esc(line.replace(/^\s*(--|\*\*)\s+/,''))+'</li>';return;
    }
    if(/^\s*[-*•]\s+/.test(line)){
      if(inSub){html+='</ul>';inSub=false;}
      if(!inList){html+='<ul>';inList=true;}
      html+='<li>'+esc(line.replace(/^\s*[-*•]\s+/,''))+'</li>';return;
    }
    closeList();
    html+='<p>'+esc(line)+'</p>';
  });
  closeList();
  return html;
}

function sgInsert(sid, prefix){
  var ta=document.getElementById('sgInputCur')||document.getElementById('sgInput_'+sid); if(!ta) return;
  var s=ta.selectionStart, e=ta.selectionEnd;
  var before=ta.value.substring(0,s), sel=ta.value.substring(s,e), after=ta.value.substring(e);
  var nl=before.length>0&&before[before.length-1]!=='\n'?'\n':'';
  var ins=nl+prefix+(sel||'');
  ta.value=before+ins+after;
  ta.focus(); ta.setSelectionRange(s+ins.length, s+ins.length);
  sgLivePreview(sid);
}

async function saveSprintGoal(sid){
  var ta=document.getElementById('sgInputCur')||document.getElementById('sgInput_'+sid); if(!ta) return;
  var text=ta.value.trim();
  var key='sg_'+sid;
  var btn=document.getElementById('sgSaveBtn_'+sid);
  if(btn){btn.disabled=true;btn.textContent='Saving…';}

  // Save locally first
  if(!text){localStorage.removeItem(key);}
  else{localStorage.setItem(key,JSON.stringify({text:text,updatedAt:Date.now(),synced:false}));}

  // Save to Google Sheet
  try{
    var params='?action=saveSprintGoal&sprintId='+encodeURIComponent(sid)+'&text='+encodeURIComponent(text)+'&email='+encodeURIComponent(window._userEmail||'')+'&_cb='+Date.now();
    var res=await fetch(API+params,{method:'GET',redirect:'follow'});
    var json=await res.json();
    if(json&&!json.error){
      if(text) localStorage.setItem(key,JSON.stringify({text:text,updatedAt:Date.now(),synced:true}));
    }
  }catch(e){console.warn('Sheet save failed:',e.message);}

  renderSprintGoal(sid,document.getElementById('sprintGoalBox'));
}

async function deleteSprintGoal(sid){
  localStorage.removeItem('sg_'+sid);
  try{
    await fetch(API+'?action=saveSprintGoal&sprintId='+encodeURIComponent(sid)+'&text=&email='+encodeURIComponent(window._userEmail||'')+'&_cb='+Date.now(),{redirect:'follow'});
  }catch(e){}
  renderSprintGoal(sid,document.getElementById('sprintGoalBox'));
}

      +'<td style="padding:8px;color:var(--mut)">'+est+'h</td>'
      +'<td style="padding:8px;color:var(--mut)">'+log+'h</td>'
      +'<td style="padding:8px;color:'+vCol+';font-weight:600">'+vTxt+'</td></tr>';

    // Find subtasks for this task
    var subs=subtaskGroups[x.taskName]||[];
    if(subs.length){
      subs.forEach(function(s){
        var se=parseFloat(s.estTime)||0,sl=parseFloat(s.timeLog)||0,sv=rnd(sl-se);
        var svCol=sv>0?'var(--red)':(sv<0?'var(--grn)':'var(--mut)');
        var svTxt=sv>0?'+'+sv+'h':(sv<0?sv+'h':'—');
        var isDone=(s.status||'').trim()==='Done';
        var sCls=isDone?'grn':((s.status||'')==='In Progress'?'amb':((s.status||'')==='In Review'?'blue':''));
        html+='<tr style="border-bottom:0.5px solid rgba(255,255,255,.03);background:rgba(155,114,245,.03)">'
          +'<td style="padding:5px 8px 5px 28px;color:'+(isDone?'var(--mut)':'var(--text)')+';font-size:10px;'+(isDone?'text-decoration:line-through;opacity:.6':'')+'">↳ '+trunc(s.taskName,45)+'</td>'
          +'<td style="padding:5px 8px"><span class="badge '+sCls+'" style="font-size:9px">'+(s.status||'NS')+'</span></td>'
          +'<td style="padding:5px 8px;font-size:9px;color:var(--mut)">Subtask</td>'
          +'<td style="padding:5px 8px;font-size:10px;color:var(--mut)">'+se+'h</td>'
          +'<td style="padding:5px 8px;font-size:10px;color:var(--mut)">'+sl+'h</td>'
          +'<td style="padding:5px 8px;font-size:10px;color:'+svCol+'">'+svTxt+'</td></tr>';
      });
    }
  });
  html+='</table></div>';
  var box=document.getElementById('bdBox');
  box.innerHTML=html; box.style.display='block';
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

}

/* ── SPILLOVERS ── */
function doSpillovers(d){
  // Sprint status detection
  var now = new Date();
  var spEnd = d.spEnd ? new Date(d.spEnd) : null;
  var isSprintEnded = spEnd && now > spEnd;
  var sprintStatus = isSprintEnded ? 'ended' : 'active';

  // ── Carried over tasks ──
  var carried = d.carried || [];
  var carryStatusText = '';
  var carryHeaderBadge = '';

  if(isSprintEnded){
    // Full view after sprint ends
    carryStatusText = 'Final view — Sprint ended '+d.endDate;
    carryHeaderBadge = '<span class="badge red" style="margin-left:8px">Sprint Ended</span>';
  } else {
    // Preview during active sprint
    carryStatusText = 'Live preview — Sprint still in progress';
    carryHeaderBadge = '<span class="badge acc" style="margin-left:8px">Live Preview</span>';
  }

  var cHtml = '';
  if(carried.length){
    // Count by status
    var doneCount = carried.filter(function(c){return(c.status||'')==='Done';}).length;
    var wipCount  = carried.filter(function(c){
      var s=(c.status||'').trim();
      return s==='In Progress'||s==='In Review'||s==='Build Awaiting';
    }).length;
    var nsCount   = carried.length - doneCount - wipCount;

    cHtml = '<div style="font-size:10px;color:var(--mut);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bor)">'
      + carryStatusText + carryHeaderBadge
      + '<br><b style="color:var(--text)">'+carried.length+'</b> total \u00b7 '
      + '<span style="color:var(--grn)">'+doneCount+' done</span> \u00b7 '
      + '<span style="color:var(--amb)">'+wipCount+' in progress</span> \u00b7 '
      + '<span style="color:var(--red)">'+nsCount+' not started</span>'
      + '</div>'
      + carried.map(function(c){
        var st=(c.status||'').trim();
        var badgeCls = st==='Done'?'grn':(st==='In Progress'||st==='In Review'?'acc':'amb');
        return '<div class="ul-row"><div class="ul-name">'+trunc(c.taskName,55)
          +'<br><span style="font-size:10px;color:var(--mut)">'+(c.assignee||'Unassigned')+' \u00b7 '+(c.estTime||0)+'h est \u00b7 '+(c.timeLog||0)+'h logged</span></div>'
          +'<div class="ul-meta"><span class="badge '+badgeCls+'">'+st+'</span></div></div>';
      }).join('');
  } else {
    cHtml = '<div class="empty">No tasks carried over from previous sprint.<br><span style="font-size:10px">'+carryStatusText+'</span></div>';
  }
  document.getElementById('carryS').innerHTML=cHtml;

  // ── Backlog section items ──
  var dateHint2 = d.startDate && d.endDate ? ' ('+d.startDate+' \u2013 '+d.endDate+')' : '';
  var bHtml = d.backlog && d.backlog.length
    ? '<div style="font-size:10px;color:var(--mut);margin-bottom:8px">Backlog items added in this sprint period'+dateHint2+'</div>'
      + d.backlog.map(function(b){
        return '<div class="ul-row"><div class="ul-name">'+trunc(b.taskName,55)
          +'<br><span style="font-size:10px;color:var(--mut)">'+(b.assignee||'Unassigned')+'</span></div>'
          +'<div class="ul-meta"><span class="badge" style="background:var(--sur2);color:var(--mut)">'+(b.status||'\u2014')+'</span></div></div>';
      }).join('')
    : '<div class="empty">No backlog items added in this sprint period.</div>';
  document.getElementById('backlogS').innerHTML=bHtml;
}

/* ── SUBTASKS ── */
var subFilter='all';
function doSubtasks(d){
  var el=document.getElementById('subS');
  var groups=d.subtaskGroups||{};
  var keys=Object.keys(groups);
  if(!keys.length){
    el.innerHTML='<div class="empty">No subtasks found in this sprint.</div>';
    return;
  }

  // Sort by completion % ascending (least done first)
  keys.sort(function(a,b){
    var da=groups[a].filter(function(s){return(s.status||'').trim()==='Done';}).length/groups[a].length;
    var db=groups[b].filter(function(s){return(s.status||'').trim()==='Done';}).length/groups[b].length;
    return da-db;
  });

  // Summary stats
  var totalParents=keys.length;
  var totalSubs=0, totalDone=0, totalEst=0, totalLog=0;
  keys.forEach(function(k){ groups[k].forEach(function(s){
    totalSubs++; if((s.status||'').trim()==='Done')totalDone++;
    totalEst+=parseFloat(s.estTime)||0; totalLog+=parseFloat(s.timeLog)||0;
  });});
  var overallPct=pc(totalDone,totalSubs);

  // Filter buttons
  var filters='<div class="sub-filter-row">'
    +'<button class="sub-filter-btn'+(subFilter==='all'?' on':'')+'" onclick="subFilter=\'all\';doSubtasks(window._sprintData)">All ('+totalParents+')</button>'
    +'<button class="sub-filter-btn'+(subFilter==='progress'?' on':'')+'" onclick="subFilter=\'progress\';doSubtasks(window._sprintData)">In Progress</button>'
    +'<button class="sub-filter-btn'+(subFilter==='done'?' on':'')+'" onclick="subFilter=\'done\';doSubtasks(window._sprintData)">Completed</button>'
    +'<button class="sub-filter-btn'+(subFilter==='blocked'?' on':'')+'" onclick="subFilter=\'blocked\';doSubtasks(window._sprintData)">Not Started</button>'
    +'<span style="margin-left:auto;font-size:11px;color:var(--mut)">'+totalDone+'/'+totalSubs+' subtasks done ('+overallPct+'%) · '+rnd(totalLog)+'/'+rnd(totalEst)+' hrs</span>'
    +'</div>';

  // Filter keys
  var filteredKeys=keys.filter(function(k){
    if(subFilter==='all') return true;
    var subs=groups[k];
    var done=subs.filter(function(s){return(s.status||'').trim()==='Done';}).length;
    if(subFilter==='done') return done===subs.length;
    if(subFilter==='progress') return done>0 && done<subs.length;
    if(subFilter==='blocked') return done===0;
    return true;
  });

  // Table
  var html=filters+'<div style="max-height:600px;overflow-y:auto;border:1px solid var(--bor);border-radius:10px">'
    +'<table class="sub-table"><thead><tr><th>Task</th><th>Status</th><th>Progress</th><th>Est.</th><th>Logged</th></tr></thead><tbody>';

  filteredKeys.forEach(function(parent,pi){
    var subs=groups[parent];
    var doneCount=subs.filter(function(s){return(s.status||'').trim()==='Done';}).length;
    var pctVal=Math.round(doneCount/subs.length*100);
    var col=pctVal>=100?'var(--grn)':(pctVal>=50?'var(--amb)':'var(--red)');
    var pEst=0,pLog=0; subs.forEach(function(s){pEst+=parseFloat(s.estTime)||0;pLog+=parseFloat(s.timeLog)||0;});
    var pid='sp_'+pi;

    html+='<tr class="sub-parent-row" onclick="toggleSubRows(\''+pid+'\')" id="'+pid+'_h">'
      +'<td><span class="sub-arrow">▶</span>'+trunc(parent,55)+' <span style="font-size:10px;color:var(--mut);font-weight:400">('+subs.length+')</span></td>'
      +'<td><span style="color:'+col+';font-size:11px;font-weight:700">'+doneCount+'/'+subs.length+'</span></td>'
      +'<td style="text-align:right"><span style="color:'+col+';font-size:11px;font-weight:600">'+pctVal+'%</span>'
      +'<div class="sub-pbar"><div class="sub-pbar-fill" style="width:'+pctVal+'%;background:'+col+'"></div></div></td>'
      +'<td style="text-align:right;font-size:11px">'+rnd(pEst)+'h</td>'
      +'<td style="text-align:right;font-size:11px">'+rnd(pLog)+'h</td>'
      +'</tr>';

    subs.forEach(function(s){
      var est=parseFloat(s.estTime)||0,log=parseFloat(s.timeLog)||0;
      var isDone=(s.status||'').trim()==='Done';
      var st=s.status||'Not Started';
      var stCls=isDone?'grn':(st==='In Progress'?'amb':(st==='In Review'?'blue':''));
      html+='<tr class="sub-child-row'+(isDone?' done':'')+'" data-parent="'+pid+'" style="display:none">'
        +'<td>'+trunc(s.taskName,50)+'</td>'
        +'<td><span class="badge '+stCls+'">'+st+'</span></td>'
        +'<td></td>'
        +'<td style="text-align:right;font-size:10px">'+rnd(est)+'h</td>'
        +'<td style="text-align:right;font-size:10px">'+rnd(log)+'h</td>'
        +'</tr>';
    });
  });

  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function toggleSubRows(pid){
  var header=document.getElementById(pid+'_h');
  var rows=document.querySelectorAll('[data-parent="'+pid+'"]');
  var isOpen=header.classList.contains('open');
  header.classList.toggle('open');
  rows.forEach(function(r){r.style.display=isOpen?'none':'table-row';});
}

/* ── BUGS & POLISH ── */
var bugsActiveTab = 'current'; // current | all | byStatus

function doBugsBacklog(d){
  var el=document.getElementById('bugsS');
  window._bugsData = d; // store for tab callbacks
  var dateHint = d.startDate && d.endDate ? d.startDate+' \u2013 '+d.endDate : '';

  // Get all bugs and current sprint bugs
  var allBugs = d.bugsRaw || d.bugs || [];  // fallback
  var currentBugs = d.bugs || [];

  // If bugsRaw not in data, we need to pass it - for now use d.bugs + allBugsTotal
  // Actually d.bugs is already filtered to current sprint; we need all separately
  // Pass through: allBugs should be everything - we'll handle this
  if(!d.bugsRaw && d.allBugsTotal > currentBugs.length){
    // We don't have raw, but we have count - show current for now
    allBugs = currentBugs;
  }

  if(!currentBugs.length && !allBugs.length){
    el.innerHTML='<div class="empty">No bugs found. Total in Bugs section: '+(d.allBugsTotal||0)+'</div>';
    return;
  }

  // Compute stats for each view
  function computeStats(list){
    var s = {notStarted:0, inProg:0, done:0, reopened:0, pause:0, total:list.length};
    list.forEach(function(b){
      var st=(b.status||'').trim();
      if(st==='Done') s.done++;
      else if(st==='In Progress'||st==='In Review') s.inProg++;
      else if(st==='Re-opened') s.reopened++;
      else if(st==='Pause') s.pause++;
      else s.notStarted++;
    });
    return s;
  }

  var curStats = computeStats(currentBugs);
  var allStats = computeStats(allBugs);

  // Tab bar
  var tabs = '<div class="tabs" style="margin-bottom:14px">'
    +'<div class="tab'+(bugsActiveTab==='current'?' on':'')+'" onclick="bugsActiveTab=\'current\';doBugsBacklog(window._bugsData)">Current Sprint ('+curStats.total+')</div>'
    +'<div class="tab'+(bugsActiveTab==='all'?' on':'')+'" onclick="bugsActiveTab=\'all\';doBugsBacklog(window._bugsData)">All Time ('+d.allBugsTotal+')</div>'
    +'<div class="tab'+(bugsActiveTab==='byStatus'?' on':'')+'" onclick="bugsActiveTab=\'byStatus\';doBugsBacklog(window._bugsData)">By Status</div>'
    +'</div>';

  // Pick list based on tab
  var listToShow, stats, subText;
  if(bugsActiveTab==='current'){
    listToShow = currentBugs;
    stats = curStats;
    subText = 'Bugs added in this sprint period \u2014 '+dateHint;
  } else if(bugsActiveTab==='all'){
    listToShow = allBugs;
    stats = allStats;
    subText = 'All bugs in Bugs & Polish section (all time)';
  } else {
    listToShow = currentBugs; // grouped view uses current
    stats = curStats;
    subText = 'Current sprint bugs grouped by status';
  }

  // KPI cards
  var doneRate = pc(stats.done, stats.total);
  var kpis = '<div class="bug-status-grid">'
    +'<div class="bug-stat"><div class="bug-val" style="color:var(--text)">'+stats.total+'</div><div class="bug-lbl">Total</div></div>'
    +'<div class="bug-stat"><div class="bug-val" style="color:var(--grn)">'+stats.done+'</div><div class="bug-lbl">Fixed ('+doneRate+'%)</div></div>'
    +'<div class="bug-stat"><div class="bug-val" style="color:var(--amb)">'+stats.inProg+'</div><div class="bug-lbl">In progress</div></div>'
    +'<div class="bug-stat"><div class="bug-val" style="color:var(--red)">'+stats.reopened+'</div><div class="bug-lbl">Re-opened</div></div>'
    +'</div>';

  function bugRow(b){
    var st=(b.status||'').trim();
    var badgeCls=st==='Done'?'grn':st==='Re-opened'?'red':(st.indexOf('Progress')!==-1||st.indexOf('Review')!==-1)?'acc':'';
    return '<div class="ul-row"><div class="ul-name">'+trunc(b.taskName,65)
      +'<br><span style="font-size:10px;color:var(--mut)">'+(b.assignee||'Unassigned')+' \u00b7 '+(b.mssTicket||'\u2014')+(b.createdOn?' \u00b7 '+b.createdOn:'')+'</span></div>'
      +'<div class="ul-meta"><span class="badge '+badgeCls+'">'+st+'</span>'
      +(b.estTime?'<span class="ul-hrs">'+(b.estTime||0)+' hrs</span>':'')
      +'</div></div>';
  }

  var listHtml = '';

  if(bugsActiveTab==='byStatus'){
    // Group by status
    var groups = {};
    listToShow.forEach(function(b){
      var st=(b.status||'Not Started').trim()||'Not Started';
      if(!groups[st]) groups[st]=[];
      groups[st].push(b);
    });
    var statusOrder = ['Re-opened','In Progress','In Review','Not Started','Pause','Done'];
    statusOrder.forEach(function(st){
      if(!groups[st]||!groups[st].length) return;
      var col = st==='Done'?'var(--grn)':st==='Re-opened'?'var(--red)':(st.indexOf('Progress')!==-1||st.indexOf('Review')!==-1)?'var(--acc)':'var(--mut)';
      listHtml += '<div style="margin-top:14px;font-size:11px;font-weight:600;color:'+col+';text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bor);padding-bottom:6px;margin-bottom:6px">'
        + st + ' <span style="color:var(--mut);font-weight:400">('+groups[st].length+')</span></div>';
      listHtml += groups[st].map(bugRow).join('');
    });
  } else {
    // Flat list with load-more
    var visible = listToShow.slice(0, 20);
    listHtml = visible.map(bugRow).join('');
    if(listToShow.length > 20){
      listHtml += '<div style="text-align:center;font-size:11px;color:var(--mut);padding:10px">Showing 20 of '+listToShow.length+' bugs</div>';
    }
  }

  if(!listToShow.length){
    listHtml = '<div class="empty">No bugs in this view.</div>';
  }

  var bugCount = listToShow.length;
  var html = tabs
    + kpis
    + '<div class="cc">'
    + '<div class="bugs-dd-header" onclick="toggleBugsList()" id="bugsDdHeader">'
    + '<div class="bugs-dd-title">'
    + '<span class="bugs-dd-chev">▶</span>'
    + '<span class="cc-t" style="margin:0">Bugs list</span>'
    + '<span class="bugs-dd-count">'+bugCount+'</span>'
    + '</div>'
    + '<div class="cc-s" style="margin:0">'+subText+'</div>'
    + '</div>'
    + '<div class="bugs-dd-body" id="bugsDdBody" style="display:none">'
    + '<div class="unplanned-list">'+listHtml+'</div>'
    + '</div></div>';

  el.innerHTML = html;
}

function toggleBugsList(){
  var header = document.getElementById('bugsDdHeader');
  var body = document.getElementById('bugsDdBody');
  if(!header || !body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  header.classList.toggle('open', !isOpen);
}

/* ── SPRINT RETROSPECTIVE ── */
var RETRO_SECTIONS = [
  { kind:'wentWell',   icon:'✅', title:'What went well',    placeholder:'A positive outcome or win from this sprint…' },
  { kind:'challenges', icon:'⚠️', title:'Challenges',         placeholder:'An issue, blocker, or friction point…' },
  { kind:'actions',    icon:'🎯', title:'Action items',       placeholder:'Specific improvement to try next sprint…' },
  { kind:'learnings',  icon:'💡', title:'Key learnings',      placeholder:'Insight or takeaway worth remembering…' },
];

function doRetrospective(d){
  var el = document.getElementById('retroS'); if(!el) return;
  window._retroSid = d.spInfo?.id || 'default';

  // Load from API (Sheet) — takes priority over localStorage
  var sheetRetro = (d.retrospectives||{})[window._retroSid];
  if(sheetRetro && sheetRetro.data){
    try {
      localStorage.setItem('retro_'+window._retroSid, JSON.stringify({
        data: sheetRetro.data,
        updatedAt: sheetRetro.updatedAt||'',
        synced: true
      }));
    } catch(e){}
  }
  renderRetro();
}

function getRetroData(){
  var key = 'retro_' + window._retroSid;
  try {
    var stored = JSON.parse(localStorage.getItem(key) || '{}') || {};
    // Handle both old format (direct object) and new (wrapped)
    return stored.data || stored;
  } catch(e) { return {}; }
}

function saveRetroData(data){
  var key = 'retro_' + window._retroSid;
  // Save locally first (immediate response)
  localStorage.setItem(key, JSON.stringify({data:data, updatedAt:Date.now(), synced:false}));
  // Sync to Google Sheet
  syncRetroToSheet(window._retroSid, data);
}

async function syncRetroToSheet(sid, data){
  try {
    var payload = encodeURIComponent(JSON.stringify(data));
    var url = API + '?action=saveRetro&sprintId=' + encodeURIComponent(sid) + '&data=' + payload + '&email=' + encodeURIComponent(window._userEmail||'') + '&_cb=' + Date.now();
    var res = await fetch(url, {method:'GET', redirect:'follow'});
    var json = await res.json();
    if(json && !json.error){
      var key = 'retro_' + sid;
      localStorage.setItem(key, JSON.stringify({data:data, updatedAt:Date.now(), synced:true}));
      // Update status indicator if rendered
      var status = document.getElementById('retroSyncStatus');
      if(status){
        status.textContent = 'Synced to Sheet \u00b7 ' + new Date().toLocaleTimeString();
        status.style.color = 'var(--grn)';
      }
    }
  } catch(e) {
    console.warn('Retro sync failed:', e.message);
    var status = document.getElementById('retroSyncStatus');
    if(status){
      status.textContent = 'Local only \u2014 sync failed';
      status.style.color = 'var(--amb)';
    }
  }
}

function renderRetro(){
  var el = document.getElementById('retroS'); if(!el) return;
  var data = getRetroData();
  var html = '<div class="retro-grid">';
  RETRO_SECTIONS.forEach(function(sec){
    var items = data[sec.kind] || [];
    var listHtml = items.length
      ? items.map(function(it, idx){
          return '<div class="retro-item"><span class="r-text">'+escHtml(it)+'</span>'
            +'<span class="r-del" onclick="deleteRetroItem(\''+sec.kind+'\','+idx+')" title="Remove">×</span></div>';
        }).join('')
      : '<div class="retro-empty">Nothing added yet.</div>';
    html += '<div class="retro-card" data-kind="'+sec.kind+'">'
      +'<div class="retro-head">'
      +'<div class="retro-title"><span class="retro-icon">'+sec.icon+'</span>'+sec.title+'</div>'
      +'<span class="retro-count">'+items.length+' item'+(items.length===1?'':'s')+'</span>'
      +'</div>'
      +'<div class="retro-list" id="retroList_'+sec.kind+'">'+listHtml+'</div>'
      +'<div class="retro-add">'
      +'<input id="retroInput_'+sec.kind+'" placeholder="'+sec.placeholder+'" onkeydown="if(event.key===\'Enter\')addRetroItem(\''+sec.kind+'\')"/>'
      +'<button class="retro-add-btn" onclick="addRetroItem(\''+sec.kind+'\')">+ Add</button>'
      +'</div>'
      +'</div>';
  });
  html += '</div>';
  // Check sync status
  var stored = {};
  try { stored = JSON.parse(localStorage.getItem('retro_'+window._retroSid) || '{}'); } catch(e){}
  var syncTxt = stored.synced
    ? '\u2601 Synced to Sheet'
    : (stored.data ? '\u26a0 Local only' : 'Press Enter to add quickly');
  var syncCol = stored.synced ? 'var(--grn)' : (stored.data ? 'var(--amb)' : 'var(--mut)');
  html += '<div style="font-size:10px;margin-top:10px;text-align:right"><span style="color:var(--mut)">Sprint: <b style="color:var(--text)">'+window._retroSid+'</b> \u00b7 </span><span id="retroSyncStatus" style="color:'+syncCol+'">'+syncTxt+'</span></div>';
  el.innerHTML = html;
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addRetroItem(kind){
  var input = document.getElementById('retroInput_'+kind);
  if(!input) return;
  var text = input.value.trim();
  if(!text) return;
  var data = getRetroData();
  if(!data[kind]) data[kind] = [];
  data[kind].push(text);
  saveRetroData(data);
  input.value = '';
  renderRetro();
  // Keep focus on the same input for rapid entry
  setTimeout(function(){ var i=document.getElementById('retroInput_'+kind); if(i) i.focus(); }, 50);
}

function deleteRetroItem(kind, idx){
  var data = getRetroData();
  if(!data[kind]) return;
  data[kind].splice(idx, 1);
  saveRetroData(data);
  renderRetro();
}

    {type:'bar',  label:'Log',  data:asns.map(function(a){return a.log;}),backgroundColor:'rgba(24,201,122,.7)',borderRadius:4,yAxisID:'y',order:2},

      y2:{position:'right',grid:{display:false},ticks:{color:'#f5a623',font:{size:10}},title:{display:true,text:'Tasks',color:'#f5a623',font:{size:10}}}

/* ── TEAM TABS ── */
function doTabs(d){
  var list=['All'].concat(d.teams.map(function(t){return t.n;}));
  document.getElementById('tRow').innerHTML=list.map(function(t){

/* ── PERFORMANCE SCORECARD ── */
function doPerformance(d){
  var el=document.getElementById('perfS');
  if(!el)return;
  var starCnt={},drainCnt={},earlyCnt={};
  (d.stars||[]).forEach(function(s){var k=s.asn;starCnt[k]=(starCnt[k]||0)+1;});
  (d.drainers||[]).forEach(function(x){var k=x.asn;drainCnt[k]=(drainCnt[k]||0)+1;});
  (d.early||[]).forEach(function(e){var k=e.asn;earlyCnt[k]=(earlyCnt[k]||0)+1;});
  var members=(d.assignees||[]).filter(function(a){return a.n!=='Unassigned'&&a.tot>0;});
  if(!members.length){el.innerHTML='<div class="empty">No assignees found.</div>';return;}
  var maxDone=Math.max.apply(null,members.map(function(a){return a.done||0;}))||1;
  var rows=members.map(function(a){
    var tot=a.tot||1,done=a.done||0,est=a.est||0,log=a.log||0;
    var sComp=Math.round(done/tot*100);
    var sEst=est<=0?0:Math.max(0,Math.round((1-Math.abs(est-log)/est)*100));
    var sProd=Math.round((done/maxDone)*100);
    var stars=starCnt[a.n]||0,drains=drainCnt[a.n]||0,earlys=earlyCnt[a.n]||0;
    var score=Math.max(0,Math.min(100,Math.round(
      sComp*.30+sEst*.25+sProd*.15+Math.min(100,stars*50)*.20+Math.min(100,earlys*50)*.10-Math.min(100,drains*40)*.15
    )));
    var grade,gCls;
    if(score>=90){grade='A+';gCls='grade-Aplus';}
    else if(score>=80){grade='A';gCls='grade-A';}
    else if(score>=70){grade='B';gCls='grade-B';}
    else if(score>=60){grade='C';gCls='grade-C';}
    else{grade='D';gCls='grade-D';}
    return{a:a,score:score,grade:grade,gCls:gCls,sComp:sComp,sEst:sEst,stars:stars,drains:drains,earlys:earlys};
  }).sort(function(x,y){return y.score-x.score;});

  var avg=Math.round(rows.reduce(function(s,r){return s+r.score;},0)/rows.length);
  var aPlus=rows.filter(function(r){return r.score>=80;}).length;
  var cMinus=rows.filter(function(r){return r.score<60;}).length;
  var topName=rows[0]?rows[0].a.n:'—';

  function barCol(s){return s>=80?'var(--grn)':s>=70?'var(--acc)':s>=60?'var(--amb)':'var(--red)';}

  var summary='<div class="perf-summary">'
    +'<div class="perf-stat"><div class="perf-stat-v">'+avg+'</div><div class="perf-stat-l">Team avg score</div></div>'
    +'<div class="perf-stat"><div class="perf-stat-v" style="color:var(--grn)">'+aPlus+'</div><div class="perf-stat-l">High performers (A+/A)</div></div>'
    +'<div class="perf-stat"><div class="perf-stat-v" style="color:var(--red)">'+cMinus+'</div><div class="perf-stat-l">Need support (&lt;60)</div></div>'
    +'<div class="perf-stat"><div class="perf-stat-v" style="color:var(--amb);font-size:13px">'+topName+'</div><div class="perf-stat-l">Top performer</div></div>'
    +'</div>';

  var tbl='<table class="perf-tbl"><thead><tr><th>#</th><th>Member</th><th>Score</th>'
    +'<th class="num">Tasks</th><th class="num">Est / Log</th>'
    +'<th class="num">Stars</th><th class="num">Drain</th><th class="num">Early</th>'
    +'<th>Grade</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    var rk=i+1,rkCls=rk===1?'r1':rk===2?'r2':rk===3?'r3':'',col=barCol(r.score);
    tbl+='<tr><td><span class="perf-rank '+rkCls+'">'+rk+'</span></td>'
      +'<td><span class="perf-name">'+r.a.n+'</span>'
      +'<span class="perf-team" style="background:'+tc(r.a.team)+'">'+r.a.team+'</span>'
      +'<div class="perf-mini">Completion '+r.sComp+'% · Est accuracy '+r.sEst+'%</div></td>'
      +'<td><span class="perf-bar"><span class="perf-bar-fill" style="width:'+r.score+'%;background:'+col+'"></span></span>'
      +'<span class="perf-score-cell" style="color:'+col+'">'+r.score+'</span></td>'
      +'<td class="num">'+r.a.done+'/'+r.a.tot+'</td>'
      +'<td class="num">'+r.a.est+' / '+r.a.log+' h</td>'
      +'<td class="num" style="color:'+(r.stars?'var(--amb)':'var(--mut)')+'">'+(r.stars||'—')+'</td>'
      +'<td class="num" style="color:'+(r.drains?'var(--red)':'var(--mut)')+'">'+(r.drains||'—')+'</td>'
      +'<td class="num" style="color:'+(r.earlys?'var(--grn)':'var(--mut)')+'">'+(r.earlys||'—')+'</td>'
      +'<td><span class="perf-grade '+r.gCls+'">'+r.grade+'</span></td></tr>';
  });
  tbl+='</tbody></table>';
  el.innerHTML=summary+'<div style="overflow-x:auto">'+tbl+'</div>';
}

/* ── EARLY COMPLETIONS ── */
function doEarly(d){
  var el=document.getElementById('eS');
  if(!d.early||!d.early.length){el.innerHTML='<div class="empty">No early completions in this sprint.</div>';return;}
  el.innerHTML='<div class="early-grid">'+d.early.map(function(e){
    var pct=Math.round(e.saved/e.est*100);
    return '<div class="ec"><div class="ec-badge">'+pct+'% faster</div>'
      +'<div class="ec-name">'+e.asn+'</div>'
      +'<div class="ec-task">'+trunc(e.name,65)+'</div>'
      +'<div class="ec-stats">'
      +'<div class="ec-st"><label>Est.</label><span style="color:var(--mut)">'+e.est+' hrs</span></div>'
      +'<div class="ec-st"><label>Logged</label><span style="color:var(--acc)">'+e.log+' hrs</span></div>'
      +'<div class="ec-st"><label>Saved</label><span style="color:var(--grn)">'+e.saved+' hrs</span></div>'
      +'</div></div>';
  }).join('')+'</div>';
}

/* ── INIT ── */
function init(){
  TEAM_COLORS={};
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spin"></div><p>Loading data from Google Sheets...</p></div>';
  fetchData()
    .then(function(json){
      raw=json;
      // Only show actual sprints:
      // Valid sprint must have start & end that look like real dates
      // e.g. "30th March 2026" — not empty, not "BACKLOG", not "BUGS"
      var sps=(json.sprints||[]).filter(function(s){
        if(!s.id || !s.start || !s.end) return false;
        if(s.id.match(/^(BUGS|BACKLOG)$/i)) return false;
        if(s.start.match(/^(BUGS|BACKLOG)$/i)) return false;
        // Start must contain a 4-digit year (e.g. 2025 or 2026)
        return s.start.match(/20\d{2}/) && s.end.match(/20\d{2}/);
      }).slice().reverse();
      if(!sps.length){
        document.getElementById('mc').innerHTML='<div class="err">No sprint data found.<br>Run manualSync() in Apps Script first.</div>';
        return;
      }
      var sel=document.getElementById('spSel');
      sel.innerHTML='';
      sps.forEach(function(s){
        var o=document.createElement('option');
        o.value=s.id; o.textContent=s.id+' · '+s.start+' – '+s.end;
        sel.appendChild(o);
      });
      cur=sps[0].id; sel.value=cur; curTeam='All';
      render(process(raw,cur));
    })
    .catch(function(e){
      document.getElementById('mc').innerHTML='<div class="err" style="text-align:left;line-height:2"><b>Failed to load data</b><br><br>Error: '+e.message+'<br><br>Please check:<br>1. Web App deployed with Access = Anyone<br>2. URL is correct in HTML<br><br><small>URL: '+API+'</small></div>';
    });
}

document.getElementById('spSel').addEventListener('change',function(){
  cur=this.value; curTeam='All'; TEAM_COLORS={};
  if(raw)render(process(raw,cur));
});
document.getElementById('syncBtn').addEventListener('click',init);
document.getElementById('thBtn').addEventListener('click',function(){
  isDark=!isDark;
  document.getElementById('root').classList.toggle('light',!isDark);
  this.textContent=isDark?'Light mode':'Dark mode';
  if(raw)render(process(raw,cur));
});

// ── AUTH FLOW ──
function showLoginScreen(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboardView').style.display='none';
  setTimeout(function(){
    var ie=document.getElementById('loginEmail');
    if(ie) ie.focus();
  },50);
}

function showDashboard(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboardView').style.display='block';
  document.getElementById('userName').textContent = name || window._userEmail;
  init();
}

function logoutUser(){
  localStorage.removeItem('dashUser');
  window._userEmail = null;
  showLoginScreen();
}

async function tryLogin(email){
  var btn=document.getElementById('loginBtn');
  var errEl=document.getElementById('loginErr');
  errEl.classList.remove('show');
  btn.disabled=true; btn.textContent='Checking...';

  try {
    var url = API + '?action=checkAccess&email=' + encodeURIComponent(email);
    var res = await fetch(url, {method:'GET', redirect:'follow'});
    var txt = await res.text();
    var json = JSON.parse(txt.trim());
    if(json.allowed){
      localStorage.setItem('dashUser', JSON.stringify({
        email: email, name: json.name, role: json.role, ts: Date.now()
      }));
      window._userEmail = email;
      window._userName = json.name;
      window._userRole = json.role;
      showDashboard(json.name);
    } else {
      errEl.textContent = 'Access denied. This email is not on the allowed list. Please contact your admin to be added.';
      errEl.classList.add('show');
    }
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message + '. Check that the Web App is deployed correctly.';
    errEl.classList.add('show');
  } finally {
    btn.disabled=false; btn.textContent='Continue';
  }
}

// Login button
document.getElementById('loginBtn').addEventListener('click', function(){
  var email = document.getElementById('loginEmail').value.trim().toLowerCase();
  if(!email || email.indexOf('@') === -1){
    var errEl=document.getElementById('loginErr');
    errEl.textContent='Please enter a valid email address.';
    errEl.classList.add('show');
    return;
  }
  tryLogin(email);
});
// Enter key to submit
document.getElementById('loginEmail').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    document.getElementById('loginBtn').click();
  }
});

// ── On page load ──
(function bootstrap(){
  var stored = localStorage.getItem('dashUser');
  if(stored){
    try {
      var user = JSON.parse(stored);
      // Session valid for 7 days
      if(user && user.email && (Date.now() - user.ts < 7*24*60*60*1000)){
        window._userEmail = user.email;
        window._userName = user.name;
        window._userRole = user.role;
        showDashboard(user.name);
        return;
      }
    } catch(e){}
  }
  showLoginScreen();
})();
</script>
